<!DOCTYPE html>
<html>
<head>
<title>MCQ Exam</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

.box{
    background:#1e293b;
    width:60%;
    margin:30px auto;
    padding:20px;
    border-radius:10px;
}

button{
    display:block;
    width:80%;
    margin:10px auto;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.selected{
    background: orange !important;
}
</style>
</head>

<body>

<h1>MCQ Exam</h1>

<div class="box">

    <h2 id="q"></h2>

    <button id="a" onclick="select(0)"></button>
    <button id="b" onclick="select(1)"></button>
    <button id="c" onclick="select(2)"></button>
    <button id="d" onclick="select(3)"></button>

    <button style="background:green;margin-top:20px;" onclick="check()">CHECK ANSWER</button>

    <h3 id="score"></h3>

</div>

<script>

let data = [
    {
        q:"2 + 2 = ?",
        options:["2","3","4","5"],
        answer:2
    },
    {
        q:"Even number?",
        options:["1","3","8","9"],
        answer:2
    },
    {
        q:"Reverse of 12?",
        options:["21","12","10","22"],
        answer:0
    }
];

let i = 0;
let score = 0;
let selected = -1;

function show(){
    let q = data[i];

    document.getElementById("q").innerText = q.q;

    document.getElementById("a").innerText = q.options[0];
    document.getElementById("b").innerText = q.options[1];
    document.getElementById("c").innerText = q.options[2];
    document.getElementById("d").innerText = q.options[3];

    document.getElementById("score").innerText = "Score: " + score;

    selected = -1;
    resetStyle();
}

function select(n){
    selected = n;
    resetStyle();

    let btns = ["a","b","c","d"];
    document.getElementById(btns[n]).classList.add("selected");
}

function resetStyle(){
    ["a","b","c","d"].forEach(id=>{
        document.getElementById(id).classList.remove("selected");
    });
}

function check(){
    if(selected === -1){
        alert("Please select an option");
        return;
    }

    if(selected === data[i].answer){
        score++;
    }

    i++;

    if(i < data.length){
        show();
    }else{
        localStorage.setItem("score",score);
        window.location.href="result.html";
    }
}

show();

</script>

</body>
</html>
